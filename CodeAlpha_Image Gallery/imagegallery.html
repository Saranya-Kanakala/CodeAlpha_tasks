<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery</title>

<style>

body{
    margin:0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

    /* Pastel Gradient */
    background: linear-gradient(135deg, #fbc2eb, #a6c1ee);

    color:#444;
    text-align:center;
}

/* Heading */
h1{
    padding:25px 0;
    margin:0;
    font-weight:600;
    letter-spacing:1px;
    color:#6a5acd;
}

/* Filter buttons */
.filters{
    margin-bottom:20px;
}

.filters button{
    padding:10px 22px;
    margin:6px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-weight:600;

    background:#ffffffcc;
    color:#555;

    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    transition:0.3s ease;
}

.filters button:hover,
.filters button.active{
    background:#ffdde1;
    color:#333;
    transform:scale(1.05);
}

/* Gallery grid */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:25px;
}

/* Image card */
.image-card{
    overflow:hidden;
    border-radius:18px;
    cursor:pointer;

    background:#ffffffcc;

    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.image-card img{
    width:100%;
    height:230px;
    object-fit:cover;
    transition:0.4s ease;
}

/* Hover */
.image-card:hover img{
    transform:scale(1.08);
    filter:brightness(85%);
}

/* Lightbox */
.lightbox{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;

    background:rgba(0,0,0,0.8);

    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:1000;
}

.lightbox img{
    max-width:85%;
    max-height:80%;
    border-radius:10px;
}

/* Close button */
.close{
    position:absolute;
    top:25px;
    right:40px;
    font-size:40px;
    cursor:pointer;
    color:white;
}

/* Nav buttons */
.nav-btn{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:50px;
    background:none;
    border:none;
    color:white;
    cursor:pointer;
}

.prev{ left:40px; }
.next{ right:40px; }

/* Mobile */
@media(max-width:768px){
    h1{
        font-size:20px;
    }
    .nav-btn{
        font-size:35px;
    }
}

</style>
</head>

<body>

<h1><b>Image Gallery</b></h1>

<div class="filters">
    <button class="active" onclick="filterImages('all', event)">All</button>
    <button onclick="filterImages('nature', event)">Nature</button>
    <button onclick="filterImages('cars', event)">Cars</button>
    <button onclick="filterImages('animals', event)">Animals</button>
</div>

<div class="gallery">

    <div class="image-card nature"><img src="https://picsum.photos/id/1018/600/400"></div>
    <div class="image-card nature"><img src="https://picsum.photos/id/1015/600/400"></div>
    <div class="image-card nature"><img src="https://picsum.photos/id/1022/600/400"></div>

    <div class="image-card cars"><img src="https://picsum.photos/id/1071/600/400"></div>
    <div class="image-card cars"><img src="https://picsum.photos/id/1050/600/400"></div>
    <div class="image-card cars"><img src="https://picsum.photos/id/1069/600/400"></div>

    <div class="image-card animals"><img src="https://picsum.photos/id/1025/600/400"></div>
    <div class="image-card animals"><img src="https://picsum.photos/id/1062/600/400"></div>
    <div class="image-card animals"><img src="https://picsum.photos/id/237/600/400"></div>

</div>

<div class="lightbox" id="lightbox">
    <span class="close" onclick="closeLightbox()">×</span>
    <button class="nav-btn prev" onclick="changeImage(-1)">❮</button>
    <img id="lightbox-img">
    <button class="nav-btn next" onclick="changeImage(1)">❯</button>
</div>

<script>

let images = document.querySelectorAll('.image-card img');
let lightbox = document.getElementById('lightbox');
let lightboxImg = document.getElementById('lightbox-img');
let currentIndex = 0;

images.forEach((img,index)=>{
    img.addEventListener('click',()=>{
        currentIndex = index;
        lightbox.style.display = "flex";
        showImage();
    });
});

function showImage(){
    lightboxImg.src = images[currentIndex].src;
}

function changeImage(direction){
    currentIndex += direction;

    if(currentIndex < 0) currentIndex = images.length - 1;
    if(currentIndex >= images.length) currentIndex = 0;

    showImage();
}

function closeLightbox(){
    lightbox.style.display = "none";
}

function filterImages(category, event){
    let cards = document.querySelectorAll('.image-card');
    let buttons = document.querySelectorAll('.filters button');

    buttons.forEach(btn=>btn.classList.remove('active'));
    event.target.classList.add('active');

    cards.forEach(card=>{
        if(category === "all" || card.classList.contains(category)){
            card.style.display = "block";
        } else {
            card.style.display = "none";
        }
    });
}

document.addEventListener('keydown',function(e){
    if(lightbox.style.display === "flex"){
        if(e.key === "ArrowRight") changeImage(1);
        if(e.key === "ArrowLeft") changeImage(-1);
        if(e.key === "Escape") closeLightbox();
    }
});

</script>

</body>
</html>
